<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine Retro Spill</title>

    <!-- Correct paths -->
    <link rel="stylesheet" href="cssindex/style.css">
    <script src="indexjs/index.js" defer></script>
</head>
<body>

<div class="overlay">
    <div class="container">

        <h1 class="main-title">Retro portal</h1>

        <p class="main-text">
            Jeg valgte dette prosjektet fordi jeg har spilt disse spillene siden jeg var ung, spesielt Doodle Jump.
            Målet mitt er å la andre spille disse spillene. I fremtiden tror jeg jeg vil beholde dette som en portefølje.
            Her kan du spille Snake, Doodle Jump og Pacman.
        </p>

        <div class="games">
            <img src="imageindex/snake.png" class="game-img" data-link="htmlgames/snake.html" alt="Snake game">
            <img src="imageindex/for-me.jpg" class="game-img" data-link="htmlgames/doodlejump.html" alt="Doodle Jump game">
            <img src="imageindex/packman.png" class="game-img" data-link="htmlgames/packman.html" alt="Pac-Man game">
        </div>

    </div>
</div>

</body>
</html>
